<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Forward</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <header>

        <h1>Tab Forward</h1>
        <h2>Abra múltiplas abas com parâmetros dinâmicos</h2>
        <p>Configure um template de URL, defina os parâmetros e abra várias abas de uma vez.</p>

    </header>
    
    <main>

        <div>

            <label for="input_url">Template da URL</label>
            <input type="text" id="input_url" name="url" placeholder="URL" required>
            
        </div>

        <div>

            <p>Parâmetros:</p>

            <form id="form">

                <label for="form_data_atual">Pegar data atual?</label>
                <input type="checkbox" name="data_atual" id="form_data_atual" value="true">

                <!-- QUEBRA DE LINHA --> <br>

                <label for="form_dia">Dia</label>
                <input type="number" id="form_dia" name="dia" min="1" max="31">
                
                <label for="form_mes">Mês</label>
                <input type="number" id="form_mes" name="mes" min="1" max="12">

                <label for="form_ano">Ano</label>
                <input type="number" id="form_ano" name="ano" min="1500" max="2200">

                <!-- QUEBRA DE LINHA --> <br>

                <label for="form_direcao_data">Direção</label>
                <select id="form_direcao_data" name="direcao_data" required>
                    <option value="sobe">Subindo (próximos dias)</option>  <!--Adicionar setas subindo e descendo-->
                    <option value="desce">Descendo (dias anteriores)</option>
                </select>

                <label for="form_passo_data">Pular de quantos em quantos dias</label>
                <input type="number" id="form_passo_data" name="passo_data" value="1" min="1">


                <hr> <!-- QUEBRA DE LINHA --> <br>

                <label for="form_id">ID</label>
                <input type="number" id="form_id" name="id" >

                <label for="form_direcao_id">Direção</label>
                <select id="form_direcao_id" name="direcao_id">
                    <option value="sobe">Subindo (próximos ids)</option>  <!--Adicionar setas subindo e descendo-->
                    <option value="desce">Descendo (ids anteriores)</option>
                </select>

                <!-- QUEBRA DE LINHA --> <br>

                <label for="form_passo_id">Pular de quantos em quantos ids</label>
                <input type="number" id="form_passo_id" name="passo_id" value="1" min="1">
                
                <label for="form_qtde_abas">Quantidade de abas</label>
                <input type="number" id="form_qtde_abas" name="qtde_abas" value="1" min="1" max="30" required>
                
                <!-- QUEBRA DE LINHA --> <br>

                <button type="button" id="button_add_parametros">Adicionar Parâmetro</button>
            </form>
            
            <div class="acoes">
                <button type="reset" id="button_limpar">Limpar</button>
                <button id="button_pre_visualizar" class="capturar">Pré-visualizar URLs</button>
                <button id="button_abrir_abas" class="capturar">Abrir abas</button>
            </div>

            <label for="select_navegador">Escolha o navegador:</label> <!--Colocar que precisa estar instalado na maquina-->
                <select id="select_navegador" name="navegador">
                    <option value="chrome">Chrome</option>
                    <option value="edge">Edge</option>
                    <option value="firefox">Firefox</option>
                    <option value="opera">Opera</option>
            </select>

            <div id="resultado_urls"></div>

        </div>

    </main>

    <script type="module" src="./assets/script/main.js"></script>
</body>
</html>
